name: PR Review

# Automated PR reviewer for FinSight, powered by GitHub Models (free for
# personal/OSS accounts via the built-in GITHUB_TOKEN — no paid API key).
#
# On every pull request it builds the diff, asks a model to review it against
# the rubric in .github/pr-review-rubric.md (focus: code quality & standards +
# privacy / data safety, per CLAUDE.md), and posts the report as a single
# sticky PR comment. The agent only reports — it never approves, merges, or
# pushes.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel an in-flight review if the PR is pushed again before it finishes.
concurrency:
  group: pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read        # read the repo / diff
      pull-requests: write  # post the review comment
      models: read          # call GitHub Models inference
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can diff against the base

      - name: Build review prompt from the diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          # Diff the PR, excluding vendored/lock/binary noise.
          git diff --no-color "$BASE_SHA" "$HEAD_SHA" -- . \
            ':(exclude).venv/**' \
            ':(exclude)**/*.lock' \
            ':(exclude)**/*.png' \
            ':(exclude)**/*.ipynb' > pr.diff || true

          # GitHub Models' free tier has a limited context window, so cap the
          # diff. ~45000 chars is a safe budget; note truncation if it happens.
          MAX=45000
          if [ "$(wc -c < pr.diff)" -gt "$MAX" ]; then
            head -c "$MAX" pr.diff > pr.diff.capped
            echo "" >> pr.diff.capped
            echo "[...diff truncated for length; review the remainder manually...]" >> pr.diff.capped
            mv pr.diff.capped pr.diff
          fi

          {
            echo "Review this pull request diff and produce the report EXACTLY"
            echo "in the format defined by the rubric in your system prompt."
            echo "Cite file paths and line numbers; quote offending code."
            echo
            echo "PR title: ${PR_TITLE}"
            echo
            echo '```diff'
            cat pr.diff
            echo '```'
          } > prompt.txt

      - name: Run review (GitHub Models)
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          max-completion-tokens: 2000
          system-prompt-file: .github/pr-review-rubric.md
          prompt-file: prompt.txt

      - name: Post review as sticky PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- finsight-pr-review -->';
            const body =
              `${marker}\n` +
              fs.readFileSync(process.env.RESPONSE_FILE, 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body,
              });
            }
        env:
          RESPONSE_FILE: ${{ steps.inference.outputs.response-file }}
